name: 'Terraformer'
description: 'Executes terraform plan and apply steps'
author: 'Brayden'
inputs:
  ARM_CLIENT_ID:
    description: 'the azure cline id'
    required: true
  ARM_CLIENT_SECRET:
    description: 'the azure client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'the azure sub'
    required: true
  ARM_TENANT_ID:
    description: 'the azure tenant id'
    required: true
  STATE_KEY:
    description: 'the unique key for state lookup'
    required: true
  TF_STAGE:
    description: 'the TF deployment stage'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'

